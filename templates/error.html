{% extends "layout.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center h-full py-16">
    <div class="text-center">
        <h1 class="text-6xl font-bold text-gray-300 mb-4">{{ code }}</h1>
        <h2 class="text-2xl font-semibold text-gray-700 mb-2">{{ message }}</h2>
        {% if error and debug %}
        <p class="text-sm text-gray-500 mb-6">{{ error }}</p>
        {% endif %}
        <a href="/" class="inline-flex items-center gap-2 bg-brand-600 text-white px-6 py-3 rounded-lg hover:bg-brand-700 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Voltar ao Início
        </a>
    </div>
</div>
{% endblock %}
